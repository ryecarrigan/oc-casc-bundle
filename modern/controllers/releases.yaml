removeStrategy:
  rbac: SYNC
  items: NONE

items:
  - kind: folder
    displayName: Releases
    name: releases
    description: 'Monthly releases from CloudBees'
    items:
      - kind: managedController
        displayName: "CloudBees CI - ${v2605}"
        description: 'Controller running the latest release from CloudBees'
        name: v2605
        configuration:
          kubernetes:
            domain: releases-v2605
            image: "CloudBees CI - Managed Controller - ${v2605}"
            replication:
              config:
                maxReplicas: 2
                replicas: 1
                targetCPUUtilizationPercentage: 80
        properties:
          - configurationAsCode:
              bundle: release-2.541.1/controller
